<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
    <style>
    /* ===== GLOBAL ===== */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      /* THAY ĐỔI: Chuyển từ gradient tối sang gradient sáng tươi mới */
      background: linear-gradient(135deg, #e0eafc, #cfdef3);
      color: #2d3436; /* THAY ĐỔI: Chữ tối để dễ đọc trên nền sáng */
    }

    /* ===== HEADER ===== */
    header {
      /* THAY ĐỔI: Nền trắng trong suốt nhẹ (Glassmorphism sáng) */
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      padding: 30px;
      text-align: center;
      color: #1a2a6c; /* THAY ĐỔI: Chữ tiêu đề màu xanh đậm */
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
    }

    header h1 { margin: 0; font-size: 2em; letter-spacing: 2px; }
    header p { opacity: 0.8; color: #34495e; }

    /* ===== CONTAINER ===== */
    .container { max-width: 1100px; margin: 30px auto; padding: 0 15px; }

    /* ===== CLASS BLOCK ===== */
    .class-group {
      margin-bottom: 35px;
      border-radius: 16px;
      overflow: hidden;
      /* THAY ĐỔI: Nền khối màu trắng hoàn toàn và đổ bóng nhẹ */
      background: #ffffff;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    
    .class-badge {
      padding: 18px 22px;
      font-size: 1.4em;
      font-weight: bold;
      color: white;
      background: linear-gradient(90deg, #4b6cb7, #182848);
    /* THAY ĐỔI: Màu lớp chuyên nghiệp hơn */
      display: flex;
      justify-content: center; /* Canh giữa theo chiều ngang */
      align-items: center;     /* Canh giữa theo chiều dọc */
    }

    /* ===== CHAPTER ===== */
    .chapter-container {
      /* THAY ĐỔI: Đường kẻ chia nhẹ nhàng hơn */
      border-top: 1px solid #eee;
    }

    .chapter-header {
      padding: 16px 20px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    .chapter-header:hover {
      transform: translateX(5px);
      filter: saturate(1.2);
    }

    /* ===== CONTENT ===== */
    .quiz-content { padding: 15px; background: #fafafa; }
    .collapsed { display: none; }

    /* ===== GRID ===== */
    .grid-row-header {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 12px;
      padding: 0 10px 10px;
      font-size: 0.8em;
      text-transform: uppercase;
      color: #7f8c8d; /* THAY ĐỔI: Màu chữ header bảng xám đậm hơn */
      text-align: center;
    }

    .quiz-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    /* ===== CARD ===== */
    .link-card {
      padding: 12px;
      border-radius: 10px;
      text-align: center;
      text-decoration: none;
      font-weight: bold;
      font-size: 0.9em;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 45px;
      transition: all 0.25s ease;
      border: 1px solid transparent;
    }

    /* ===== MAIN LINK ===== */
    .main-link {
      background: #ffffff;
      color: #0072ff;
      border: 1px solid #0072ff; /* THAY ĐỔI: Viền xanh rực rỡ */
      box-shadow: 0 4px 6px rgba(0, 114, 255, 0.1);
    }

    .main-link:hover {
      background: #0072ff;
      color: white;
      transform: translateY(-3px);
      box-shadow: 0 8px 15px rgba(0, 114, 255, 0.2);
    }

    /* ===== BACKUP ===== */
    .backup-link {
      /* THAY ĐỔI: Nền xám rất nhạt cho nút dự phòng */
      background: #f1f2f6;
      color: #57606f;
      border: 1px solid #dfe4ea;
    }

    .backup-link:hover {
      background: #dfe4ea;
      color: #2f3542;
    }

    .no-link {
      opacity: 0.5;
      background: #eee;
      border: 1px dashed #ccc;
      color: #a4b0be;
    }

    /* Animation & Mobile (Giữ nguyên logic của bạn) */
    .quiz-row { animation: fadeInUp 0.4s ease; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      .grid-row-header { display: none; }
      .quiz-row {
        grid-template-columns: 1fr;
        padding: 10px;
        border-radius: 10px;
        background: #ffffff;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      }
    }
  </style>
</head>

      { lop: "11", chapter: "TIẾNG ANH", title: "Unit 1: Generation Gap", file: "link_chinh", backup1: null, backup2: null }
    ];

    document.getElementById("site-title").textContent = SITE_INFO.title;
    document.getElementById("site-author").textContent = SITE_INFO.author;

    function toggleChapter(element) {
      const content = element.nextElementSibling;
      const icon = element.querySelector('.icon');
      content.classList.toggle('collapsed');
      icon.textContent = content.classList.contains('collapsed') ? '▸' : '▾';
    }

    function render() {
      const container = document.getElementById("main-list");
      let html = "";

      CLASS_LIST.forEach(cls => {
        // KIỂM TRA SHOW LỚP
        if (cls.show === false) return;

        const chapters = {};
        QUIZ_PAGES.filter(p => p.lop === cls.key).forEach(p => {
          if (!chapters[p.chapter]) chapters[p.chapter] = [];
          chapters[p.chapter].push(p);
        });

        if (Object.keys(chapters).length === 0) return;

        html += `<div class="class-group">
                  <div class="class-badge">${cls.title}</div>`;

        let colorIdx = 0;
        for (const chapName in chapters) {
          const config = CHAPTER_CONFIG[cls.key]?.[chapName] || { expand: false, show: true };
          if (config.show === false) continue;

          const color = COLORS[colorIdx % COLORS.length];
          html += `
            <div class="chapter-container">
              <div class="chapter-header" onclick="toggleChapter(this)" style="background:${color}">
                <span>${chapName}</span>
                <span class="icon">${config.expand ? '▾' : '▸'}</span>
              </div>
              <div class="quiz-content ${config.expand ? '' : 'collapsed'}">
                <div class="grid-row-header">
                  <div>Link chính</div>
                  <div>Link dự phòng 1</div>
                  <div>Link dự phòng 2</div>
                </div>
          `;

          chapters[chapName].forEach(quiz => {
            html += `
              <div class="quiz-row">
                <a href="${quiz.file}" class="link-card main-link" >${quiz.title}</a>
                
                ${quiz.backup1 
                  ? `<a href="${quiz.backup1}" class="link-card backup-link" >Link dự phòng 1</a>`
                  : `<div class="link-card backup-link no-link">Trống</div>`}
                
                ${quiz.backup2 
                  ? `<a href="${quiz.backup2}" class="link-card backup-link" >Link dự phòng 2</a>`
                  : `<div class="link-card backup-link no-link">Trống</div>`}
              </div>
            `;
          });

          html += `</div></div>`;
          colorIdx++;
        }
        html += `</div>`;
      });
      container.innerHTML = html;
    }

    render();
  </script>
